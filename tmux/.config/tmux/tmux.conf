# --- Essential Settings ---
set -g status-position top    # Move bar to the top
set -g mouse on               # Scroll with mouse wheel in Ghostty/Alacritty
set -g base-index 1           # Windows start at 1
setw -g pane-base-index 1     # Panes start at 1
set -g renumber-windows on    # Keep window numbers sequential
set -g escape-time 0          # No delay for escape key

# --- Prefix & Navigation ---
unbind C-b
set -g prefix C-a              # Ctrl-a is much easier for doctors/devs
bind C-a send-prefix

# Standard Pane Navigation (Prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Better Splitting (uses current path)
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Toggle a floating terminal with Prefix + T
bind t display-popup -E -w 80% -h 80% "zsh"

# --- Copy Mode (Stand-alone Vim Feel) ---
setw -g mode-keys vi
bind v copy-mode                                                  # Prefix+v enters copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection          # v starts selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle       # Ctrl-v for block select
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Project launcher ---
bind p display-popup -E -w 40% -h 50% "~/.config/tmux/scripts/sessionizer"

# --- Renaming sessions and windows ---
# Define the 'rename' table
bind-key r switch-client -T rename-table

# Bind 'w' within that table to rename the window
bind-key -T rename-table w command-prompt -I "#W" "rename-window '%%'"

# Bind 's' within that table to rename the session
bind-key -T rename-table s command-prompt -I "#S" "rename-session '%%'"

# --- Plugins (Only the essentials) ---
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

# --- Catppuccin Theme ---
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Window tabs: show name (falls back to app name automatically via #W)
# The plugin renders the index (#I) separately in the number pill — no need to repeat it here
set -g @catppuccin_window_text " #W "
set -g @catppuccin_window_current_text " #W "
set -g @catppuccin_window_current_background "#{@thm_mauve}"

# Load catppuccin before setting status (required so theme variables are defined)
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

# --- Status Line ---
# Left: session name only
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"

# Right: empty — window list is pushed right via status-justify
set -g status-right-length 0
set -g status-right ""

# Gap between window pills
set -g window-status-separator " "

# Push the window list to the right side of the bar
set -g status-justify right

run '~/.config/tmux/plugins/tpm/tpm'
